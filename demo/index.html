<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcSLA · Arc Testnet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <style>
      :root {
        --bg-0: #fafafa;
        --bg-1: #ffffff;
        --bg-2: #f5f5f5;
        --bg-3: #eeeeee;
        --border: #e5e7eb;
        --border-hi: #d1d5db;
        --text: #0a0a0a;
        --text-dim: #525252;
        --text-faint: #9ca3af;
        --accent: #059669;
        --accent-dim: #10b981;
        --accent-bg: rgba(5, 150, 105, 0.08);
        --danger: #dc2626;
        --danger-bg: rgba(220, 38, 38, 0.08);
        --warn: #d97706;
        --warn-bg: rgba(217, 119, 6, 0.08);
        --info: #2563eb;
        --info-bg: rgba(37, 99, 235, 0.08);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.04);
        --font-mono: ui-monospace, "SF Mono", "Menlo", "Monaco", "Cascadia Code", monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-0);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.55;
        letter-spacing: -0.005em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
      }

      body {
        background-image:
          radial-gradient(ellipse 1200px 600px at 20% -10%, rgba(5, 150, 105, 0.04), transparent 50%),
          radial-gradient(ellipse 900px 500px at 110% 20%, rgba(37, 99, 235, 0.03), transparent 50%);
        background-attachment: fixed;
      }

      button, input, select, textarea {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        backdrop-filter: blur(16px) saturate(180%);
        background: rgba(250, 250, 250, 0.75);
        border-bottom: 1px solid var(--border);
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 48px;
        max-width: 1800px;
        margin: 0 auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 20px;
        color: #ffffff;
        letter-spacing: -0.02em;
      }

      .brand-title {
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1.2;
      }

      .network-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 4px;
        background: var(--bg-2);
        border: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
      }

      .net-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-faint);
      }

      .net-dot.ok {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }

      .wallet-box {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border: 1px solid var(--border);
        background: var(--bg-1);
        color: var(--text);
        border-radius: 8px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 14px;
        font-family: inherit;
        letter-spacing: -0.005em;
        box-shadow: var(--shadow-sm);
      }

      .btn:hover:not(:disabled) {
        border-color: var(--border-hi);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: var(--shadow-sm);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #ffffff;
        border-color: var(--accent);
        font-weight: 600;
      }

      .btn-primary:hover:not(:disabled) {
        background: #047857;
        border-color: #047857;
      }

      .grid {
        max-width: 1800px;
        margin: 0 auto;
        padding: 32px 48px 60px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }

      @media (max-width: 1100px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }

      .panel:hover {
        box-shadow: var(--shadow-md);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid var(--border);
      }

      .panel-head h2 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .panel-body {
        padding: 22px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .field label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px 14px;
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: all 0.15s ease;
      }

      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-bg);
      }

      .alert {
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 13px;
      }

      .alert.error {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid rgba(220, 38, 38, 0.25);
      }

      .alert.success {
        background: var(--accent-bg);
        color: var(--accent);
        border: 1px solid rgba(5, 150, 105, 0.25);
      }

      .alert.info {
        background: var(--info-bg);
        color: var(--info);
        border: 1px solid rgba(37, 99, 235, 0.25);
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--text-faint);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .mono {
        font-family: var(--font-mono);
        font-size: 12px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">∴</div>
          <div>
            <div class="brand-title">ArcSLA</div>
          </div>
        </div>
        <div class="network-pill">
          <div class="net-dot ok"></div>
          <span>Arc Testnet</span>
        </div>
        <div class="wallet-box">
          <button id="connectBtn" class="btn btn-primary">Connect Wallet</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="panel-head">
          <h2>Register Provider</h2>
        </div>
        <div class="panel-body">
          <div id="registerAlert"></div>
          <div class="field">
            <label>Stake (USDC)</label>
            <input type="number" id="stakeInput" placeholder="100" min="0.1" step="0.1" />
          </div>
          <div class="field">
            <label>Price Per Call (USDC)</label>
            <input type="number" id="priceInput" placeholder="1" min="0.1" step="0.1" />
          </div>
          <div class="field">
            <label>Max Response Time (seconds)</label>
            <input type="number" id="maxRespInput" placeholder="30" min="5" />
          </div>
          <div class="field">
            <label>Slash % (0-100)</label>
            <input type="number" id="slashInput" placeholder="20" min="0" max="100" />
          </div>
          <div class="field">
            <label>Endpoint URL</label>
            <input type="text" id="endpointInput" placeholder="https://api.example.com" />
          </div>
          <button id="registerBtn" class="btn btn-primary" style="width: 100%;">Register Provider</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Call Service</h2>
        </div>
        <div class="panel-body">
          <div id="callAlert"></div>
          <div class="field">
            <label>Provider ID</label>
            <input type="number" id="providerIdInput" placeholder="1" />
          </div>
          <div class="field">
            <label>Request Hash</label>
            <input type="text" id="requestHashInput" placeholder="Auto-generated" readonly />
          </div>
          <button id="callServiceBtn" class="btn btn-primary" style="width: 100%;">Call Service</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Submit Receipt</h2>
        </div>
        <div class="panel-body">
          <div id="receiptAlert"></div>
          <div class="field">
            <label>Call ID</label>
            <input type="text" id="callIdInput" placeholder="0x..." />
          </div>
          <div class="field">
            <label>Response Hash</label>
            <input type="text" id="responseHashInput" placeholder="0x..." />
          </div>
          <button id="submitReceiptBtn" class="btn btn-primary" style="width: 100%;">Submit Receipt</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Claim Timeout</h2>
        </div>
        <div class="panel-body">
          <div id="timeoutAlert"></div>
          <div class="field">
            <label>Call ID</label>
            <input type="text" id="timeoutCallIdInput" placeholder="0x..." />
          </div>
          <button id="claimTimeoutBtn" class="btn btn-primary" style="width: 100%;">Claim Timeout</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Recent Events</h2>
        </div>
        <div class="panel-body">
          <div id="eventFeed" style="max-height: 400px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px;">
            <div style="color: var(--text-faint); text-align: center; padding: 20px;">
              Waiting for events...
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==================== CONFIG ====================
      const CONFIG = {
        SERVICE_REGISTRY: "0x74635245CfF23a7F261CD5ECF72693cbc75481e4",
        PAY_PER_CALL: "0x28aa00Af89483218E6Bc036a72C4bAe8A1514BFE",
        USDC_ADDRESS: "0x3600000000000000000000000000000000000000",
        CHAIN_ID: "0x" + (5042002).toString(16),
        RPC_URL: "https://rpc.testnet.arc.network"
      };

      // ==================== SERVICE REGISTRY ABI ====================
      const SERVICE_REGISTRY_ABI = [
        "function register(address signer, uint256 stakeAmount, uint256 pricePerCall_, uint32 maxResponseTime, uint32 slashBps, string calldata endpoint) external returns (uint256)",
        "function getProvider(uint256 providerId) external view returns (tuple(address owner, address signer, uint256 stake, uint256 pricePerCall, uint32 maxResponseTime, uint32 slashBps, bool active))",
        "function setPayPerCall(address _payPerCall) external"
      ];

      // ==================== PAY PER CALL ABI ====================
      const PAY_PER_CALL_ABI = [
        "function callService(uint256 providerId, bytes32 requestHash) external returns (bytes32)",
        "function submitReceipt(bytes32 callId, bytes32 responseHash, bytes calldata signature) external",
        "function claimTimeout(bytes32 callId) external",
        "function getCall(bytes32 callId) external view returns (tuple(uint256 providerId, address caller, uint256 amount, uint32 startedAt, uint32 deadline, bytes32 requestHash, bytes32 responseHash, uint8 status))"
      ];

      // ==================== USDC ABI ====================
      const USDC_ABI = [
        "function approve(address spender, uint256 amount) external returns (bool)",
        "function balanceOf(address account) external view returns (uint256)",
        "function allowance(address owner, address spender) external view returns (uint256)"
      ];

      // ==================== STATE ====================
      let provider, signer, userAddress;
      let registryContract, payPerCallContract, usdcContract;

      // ==================== HELPERS ====================
      function showAlert(elementId, message, type = "error") {
        const elem = document.getElementById(elementId);
        elem.innerHTML = `<div class="alert ${type}">${message}</div>`;
        setTimeout(() => { elem.innerHTML = ""; }, 5000);
      }

      function addEvent(title, details) {
        const feed = document.getElementById("eventFeed");
        const entry = document.createElement("div");
        entry.style.borderBottom = "1px solid var(--border)";
        entry.style.padding = "10px";
        entry.innerHTML = `<strong>${title}</strong><br/><small style="color: var(--text-faint);">${details}</small>`;
        feed.insertBefore(entry, feed.firstChild);
        if (feed.children.length > 20) feed.removeChild(feed.lastChild);
      }

      function shortenAddress(addr) {
        if (!addr) return "";
        return addr.substring(0, 6) + "..." + addr.substring(addr.length - 4);
      }

      // ==================== NETWORK & WALLET ====================
      async function connectWallet() {
        if (!window.ethereum) {
          alert("MetaMask not installed");
          return;
        }

        try {
          // Switch to Arc Testnet
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: CONFIG.CHAIN_ID }]
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                  chainId: CONFIG.CHAIN_ID,
                  chainName: "Arc Testnet",
                  rpcUrls: [CONFIG.RPC_URL],
                  nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 6 }
                }]
              });
            } else {
              throw switchError;
            }
          }

          // Request accounts
          const accounts = await window.ethereum.request({
            method: "eth_requestAccounts"
          });

          userAddress = accounts[0];
          
          // Setup providers
          provider = new ethers.JsonRpcProvider(CONFIG.RPC_URL);
          signer = provider.getSigner(userAddress);

          // Initialize contracts
          registryContract = new ethers.Contract(CONFIG.SERVICE_REGISTRY, SERVICE_REGISTRY_ABI, signer);
          payPerCallContract = new ethers.Contract(CONFIG.PAY_PER_CALL, PAY_PER_CALL_ABI, signer);
          usdcContract = new ethers.Contract(CONFIG.USDC_ADDRESS, USDC_ABI, signer);

          document.getElementById("connectBtn").textContent = `Connected: ${shortenAddress(userAddress)}`;
          document.getElementById("connectBtn").disabled = true;

          addEvent("Connected", `Wallet: ${shortenAddress(userAddress)}`);

          // Generate random request hash
          document.getElementById("requestHashInput").value = "0x" + Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join("");

        } catch (error) {
          console.error(error);
          alert("Connection failed: " + error.message);
        }
      }

      // ==================== REGISTER PROVIDER ====================
      async function registerProvider() {
        if (!signer) { alert("Connect wallet first"); return; }

        try {
          const stake = ethers.parseUnits(document.getElementById("stakeInput").value || "100", 6);
          const price = ethers.parseUnits(document.getElementById("priceInput").value || "1", 6);
          const maxResp = parseInt(document.getElementById("maxRespInput").value || "30");
          const slash = parseInt(document.getElementById("slashInput").value || "20") * 100; // BPS
          const endpoint = document.getElementById("endpointInput").value || "https://api.example.com";

          const signerAddr = await signer.getAddress();

          // Approve USDC
          const approveTx = await usdcContract.approve(CONFIG.SERVICE_REGISTRY, stake);
          await approveTx.wait();
          showAlert("registerAlert", "USDC approved, registering...", "info");

          // Register
          const tx = await registryContract.register(signerAddr, stake, price, maxResp, slash, endpoint);
          const receipt = await tx.wait();

          showAlert("registerAlert", "Provider registered! TX: " + receipt.hash, "success");
          addEvent("Provider Registered", `Stake: ${document.getElementById("stakeInput").value} USDC`);

        } catch (error) {
          console.error(error);
          showAlert("registerAlert", "Error: " + (error.reason || error.message), "error");
        }
      }

      // ==================== CALL SERVICE ====================
      async function callService() {
        if (!signer) { alert("Connect wallet first"); return; }

        try {
          const providerId = parseInt(document.getElementById("providerIdInput").value);
          const requestHash = document.getElementById("requestHashInput").value;

          const provider_obj = await registryContract.getProvider(providerId);
          const pricePerCall = provider_obj.pricePerCall;

          // Approve USDC
          const approveTx = await usdcContract.approve(CONFIG.PAY_PER_CALL, pricePerCall);
          await approveTx.wait();
          showAlert("callAlert", "USDC approved, calling service...", "info");

          // Call
          const tx = await payPerCallContract.callService(providerId, requestHash);
          const receipt = await tx.wait();

          showAlert("callAlert", "Service called! TX: " + receipt.hash, "success");
          addEvent("Call Started", `Provider: ${providerId}, Amount: ${ethers.formatUnits(pricePerCall, 6)} USDC`);

        } catch (error) {
          console.error(error);
          showAlert("callAlert", "Error: " + (error.reason || error.message), "error");
        }
      }

      // ==================== SUBMIT RECEIPT ====================
      async function submitReceipt() {
        if (!signer) { alert("Connect wallet first"); return; }

        try {
          const callId = document.getElementById("callIdInput").value;
          const responseHash = document.getElementById("responseHashInput").value;

          const signerAddr = await signer.getAddress();

          // Sign the receipt
          const digest = ethers.keccak256(ethers.solidityPacked(["bytes32", "bytes32"], [callId, responseHash]));
          const sig = await signer.signMessage(ethers.getBytes(digest));

          showAlert("receiptAlert", "Receipt signed, submitting...", "info");

          // Submit
          const tx = await payPerCallContract.submitReceipt(callId, responseHash, sig);
          const receipt = await tx.wait();

          showAlert("receiptAlert", "Receipt submitted! TX: " + receipt.hash, "success");
          addEvent("Receipt Submitted", `Call: ${callId.substring(0, 10)}...`);

        } catch (error) {
          console.error(error);
          showAlert("receiptAlert", "Error: " + (error.reason || error.message), "error");
        }
      }

      // ==================== CLAIM TIMEOUT ====================
      async function claimTimeout() {
        if (!signer) { alert("Connect wallet first"); return; }

        try {
          const callId = document.getElementById("timeoutCallIdInput").value;

          const tx = await payPerCallContract.claimTimeout(callId);
          const receipt = await tx.wait();

          showAlert("timeoutAlert", "Timeout claimed! TX: " + receipt.hash, "success");
          addEvent("Timeout Claimed", `Call: ${callId.substring(0, 10)}... - Refund + Slash processed`);

        } catch (error) {
          console.error(error);
          showAlert("timeoutAlert", "Error: " + (error.reason || error.message), "error");
        }
      }

      // ==================== EVENT LISTENERS ====================
      document.getElementById("connectBtn").addEventListener("click", connectWallet);
      document.getElementById("registerBtn").addEventListener("click", registerProvider);
      document.getElementById("callServiceBtn").addEventListener("click", callService);
      document.getElementById("submitReceiptBtn").addEventListener("click", submitReceipt);
      document.getElementById("claimTimeoutBtn").addEventListener("click", claimTimeout);

      // ==================== INIT ====================
      window.addEventListener("load", () => {
        addEvent("Loaded", "ArcSLA Demo initialized. Connect wallet to start.");
      });
    </script>
  </body>
</html>
