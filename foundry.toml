[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["ServiceRegistry", "PayPerCall"]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
